# Main configuration for Coalition Formation experiments
# Override with: python train.py protocol=coalt seed=42

defaults:
  - protocol: coalt
  - data: coalition_qa
  - _self_

# ════════════════════════════════════════════════════════════════════════════════
# Experiment Settings
# ════════════════════════════════════════════════════════════════════════════════

experiment:
  name: coalition_formation
  seed: 42
  deterministic: true
  num_episodes: 400
  max_rounds: 30

# ════════════════════════════════════════════════════════════════════════════════
# Game Parameters
# ════════════════════════════════════════════════════════════════════════════════

game:
  num_agents: 6
  capability_dims: 3  # math, facts, logic
  
  # Value function parameters (Equation 1)
  coordination_cost:
    alpha: 0.15  # Coordination cost coefficient
    beta: 1.3    # Coordination cost exponent (superlinear)
  
  # Stability parameters
  value_gap_delta: 0.08  # δ for value gap condition
  
  # Agent capability profiles (Table 2)
  agents:
    - id: "a1"
      model: "gpt-4-0125-preview"
      capabilities: [0.68, 0.73, 0.76]  # math, facts, logic
    - id: "a2"
      model: "gpt-4-0125-preview"
      capabilities: [0.65, 0.76, 0.73]
    - id: "a3"
      model: "claude-3-opus-20240229"
      capabilities: [0.62, 0.78, 0.74]
    - id: "a4"
      model: "claude-3-opus-20240229"
      capabilities: [0.59, 0.81, 0.71]
    - id: "a5"
      model: "meta-llama/Llama-3-70b-chat-hf"
      capabilities: [0.58, 0.65, 0.79]
    - id: "a6"
      model: "meta-llama/Llama-3-70b-chat-hf"
      capabilities: [0.55, 0.68, 0.76]

# ════════════════════════════════════════════════════════════════════════════════
# LLM API Settings
# ════════════════════════════════════════════════════════════════════════════════

api:
  temperature: 0.0  # τ=0 for reproducibility
  max_tokens: 1024
  timeout: 60
  max_retries: 3
  
  # API endpoints (configured via environment variables)
  openai:
    model: "gpt-4-0125-preview"
    # api_key: ${OPENAI_API_KEY}
  
  anthropic:
    model: "claude-3-opus-20240229"
    # api_key: ${ANTHROPIC_API_KEY}
  
  together:
    model: "meta-llama/Llama-3-70b-chat-hf"
    # api_key: ${TOGETHER_API_KEY}

# ════════════════════════════════════════════════════════════════════════════════
# Evaluation Metrics
# ════════════════════════════════════════════════════════════════════════════════

evaluation:
  metrics:
    - nash_stability
    - convergence_rounds
    - social_welfare
    - preference_consistency
  
  # Statistical testing
  statistical:
    test: wilcoxon  # Wilcoxon signed-rank test
    correction: bonferroni
    alpha: 0.01
    bootstrap_iterations: 10000
    confidence_level: 0.95

# ════════════════════════════════════════════════════════════════════════════════
# Output Settings
# ════════════════════════════════════════════════════════════════════════════════

output:
  dir: outputs/${experiment.name}/${now:%Y-%m-%d_%H-%M-%S}
  save_episodes: true
  save_trajectories: true
  log_level: INFO

# Hydra settings
hydra:
  run:
    dir: ${output.dir}
  sweep:
    dir: outputs/sweeps/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
